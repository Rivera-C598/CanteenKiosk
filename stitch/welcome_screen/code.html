<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HyperBite - Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#8ffda5",
                        "secondary": "#745700",
                        "on-tertiary": "#ceffd1",
                        "secondary-dim": "#654c00",
                        "error-dim": "#a70138",
                        "secondary-fixed-dim": "#f2bc1e",
                        "on-surface-variant": "#824c51",
                        "on-secondary-fixed": "#433200",
                        "inverse-on-surface": "#cc8c91",
                        "tertiary-fixed-dim": "#80ee98",
                        "primary-fixed": "#ff7764",
                        "on-secondary-fixed-variant": "#664d00",
                        "surface-container": "#ffe1e2",
                        "tertiary-dim": "#005d28",
                        "primary-container": "#ff7764",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#ffd2d4",
                        "inverse-primary": "#ff5541",
                        "secondary-fixed": "#ffca42",
                        "on-secondary": "#fff1d9",
                        "on-surface": "#4d2126",
                        "on-tertiary-fixed-variant": "#006c30",
                        "tertiary": "#006a2f",
                        "on-primary": "#ffefed",
                        "inverse-surface": "#240307",
                        "outline-variant": "#de9ca1",
                        "primary-dim": "#a40001",
                        "primary-fixed-dim": "#ff5b48",
                        "error-container": "#f74b6d",
                        "on-primary-fixed": "#000000",
                        "surface-dim": "#ffc6ca",
                        "on-tertiary-fixed": "#004c20",
                        "on-primary-fixed-variant": "#610000",
                        "on-error": "#ffefef",
                        "surface": "#fff4f4",
                        "secondary-container": "#ffca42",
                        "on-secondary-container": "#5b4400",
                        "background": "#fff4f4",
                        "on-tertiary-container": "#00612b",
                        "on-background": "#4d2126",
                        "surface-container-low": "#ffeced",
                        "surface-bright": "#fff4f4",
                        "on-error-container": "#510017",
                        "outline": "#a1676c",
                        "surface-container-high": "#ffdadb",
                        "surface-variant": "#ffd2d4",
                        "on-primary-container": "#4f0000",
                        "surface-tint": "#b90905",
                        "error": "#b41340",
                        "primary": "#b90905",
                        "tertiary-fixed": "#8ffda5"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .hero-gradient {
            background: radial-gradient(circle at center, transparent 0%, rgba(255, 244, 244, 0.4) 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body overflow-hidden select-none">
<!-- Top Navigation Anchor (Manual construction based on JSON structure) -->
<header class="w-full top-0 sticky z-50 bg-[#fff4f4] dark:bg-stone-950 flex justify-between items-center px-8 py-6">
<div class="text-3xl font-black italic text-[#b90905] dark:text-red-500 tracking-tighter">
            HyperBite
        </div>
<!-- School Branding Slot -->
<div class="flex items-center gap-4 bg-surface-container-low px-6 py-2 rounded-full">
<div class="w-8 h-8 rounded-full bg-secondary flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm" data-icon="school">school</span>
</div>
<span class="font-headline font-bold text-on-surface text-sm tracking-wide">UNIVERSITY CAMPUS KIOSK</span>
</div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-[#b90905] dark:text-red-500 text-3xl" data-icon="shopping_cart">shopping_cart</span>
</div>
</header>
<main class="relative h-[calc(100vh-88px)] flex flex-col items-center justify-center overflow-hidden">
<!-- Background Culinary Stage -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 hero-gradient z-10"></div>
<img alt="Gourmet Burger" class="w-full h-full object-cover object-center opacity-90 scale-105" data-alt="Stunning close-up of a gourmet double cheeseburger with melting cheese, crispy bacon, and fresh lettuce on a toasted brioche bun against a minimalist warm studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEr0fRTrXxDWCyznqNke_lh-YOQsYjZbDfNq-ONGM9ALNUOqzHOy_rWXYu0k1ZXny5A-cWfgkOAyGL8Pk5yBhbkdIJKZhg2aVbcvVnE2c7ylynsY_FwIGeAagvv9NpV85E8v5nUmyk-s3S8l_8MCsA2kyqBe9JCc803oBCR5HoVH7PFXQABGbwVCCxJL3G1FPW7vN3XP4sU6IsQL82K647Bu2j3VXyvkGbOpHL_2f-8eT2IWj7xfRjEkLzcFggp8VPk6kJPhIRtBg"/>
</div>
<!-- Asymmetric Content Overlay -->
<div class="relative z-20 w-full max-w-7xl px-12 grid grid-cols-12 gap-8 items-center">
<!-- Hero Text Section -->
<div class="col-span-12 md:col-span-7 flex flex-col items-start gap-6">
<div class="bg-primary px-6 py-2 rounded-full mb-2">
<span class="text-on-primary font-headline font-extrabold text-lg uppercase tracking-widest italic">Student Favorites</span>
</div>
<h1 class="font-headline font-black text-8xl md:text-9xl text-on-background leading-[0.9] tracking-tighter">
                    FUEL YOUR <br/>
<span class="text-primary italic">STRENGTH.</span>
</h1>
<p class="text-on-surface-variant font-medium text-2xl max-w-lg leading-relaxed mt-4">
                    The ultimate campus burger experience. Freshly grilled, lightning fast, and student-budget friendly.
                </p>
</div>
<!-- Tap to Start Interactive Zone -->
<div class="col-span-12 md:col-span-5 flex flex-col items-center md:items-end">
<button class="group relative flex flex-col items-center justify-center w-80 h-80 bg-primary text-on-primary rounded-full shadow-2xl shadow-primary/40 transform active:scale-95 transition-all duration-300">
<!-- Ripple/Pulse Effect -->
<div class="absolute inset-0 rounded-full border-[12px] border-primary-container opacity-50 animate-ping"></div>
<div class="relative flex flex-col items-center gap-4">
<span class="material-symbols-outlined text-7xl" data-icon="touch_app" style="font-variation-settings: 'FILL' 1;">touch_app</span>
<span class="font-headline font-black text-3xl text-center leading-tight tracking-tight px-10">
                            TAP HERE <br/> TO START
                        </span>
</div>
<!-- Decorative Element -->
<div class="absolute -bottom-4 -right-4 bg-secondary-container text-on-secondary-container px-6 py-3 rounded-full font-headline font-bold shadow-xl">
                        GET 20% OFF
                    </div>
</button>
</div>
</div>
<!-- Footer Visual Anchors -->
<div class="absolute bottom-12 w-full px-12 flex justify-between items-end z-30">
<!-- Language Selector (Kiosk UI standard) -->
<div class="flex gap-4">
<button class="glass-panel px-8 py-4 rounded-full font-headline font-bold text-on-surface shadow-lg hover:bg-white transition-colors flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="language">language</span>
                    ENGLISH
                </button>
<button class="glass-panel px-8 py-4 rounded-full font-headline font-bold text-on-surface shadow-lg hover:bg-white transition-colors flex items-center gap-3">
                    ESPAÑOL
                </button>
</div>
<!-- Support / Assistance -->
<div class="flex flex-col items-end gap-4">
<div class="glass-panel p-6 rounded-xl flex items-center gap-4 max-w-xs shadow-xl">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="contact_support">contact_support</span>
</div>
<div>
<p class="font-headline font-bold text-sm text-on-surface">Need help ordering?</p>
<p class="text-xs text-on-surface-variant font-medium">Touch for assistance</p>
</div>
</div>
</div>
</div>
</main>
<!-- Invisible Bottom Shell (Not rendered for Welcome Screen per Shell Visibility Rule) -->
<!-- The Welcome Screen is Task-Focused/Linear, so we suppress the global nav to focus on the 'Tap to Start' CTA -->
</body></html>
